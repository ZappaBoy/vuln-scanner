# Deliberately vulnerable applications for scanner testing.
# These containers expose well-known security flaws on purpose.
# DO NOT expose them to untrusted networks or the public internet.
#
# Usage:
#   docker compose -f docker-compose.target.yaml up -d
#
# Then scan them:
#   docker compose -f docker-compose.yml -f docker-compose.scanner.yml \
#     run --rm scanner \
#       --targets juice-shop webgoat \
#       --mode active

services:

  # OWASP Juice Shop — modern Node.js app covering OWASP Top 10
  # https://owasp.org/www-project-juice-shop/
  juice-shop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      vuln_net:
        aliases:
          - juice-shop

  # OWASP WebGoat — Java/Spring intentionally insecure app
  # https://owasp.org/www-project-webgoat/
  webgoat:
    image: webgoat/webgoat:latest
    ports:
      - "8888:8080"
      - "9090:9090"
    restart: unless-stopped
    networks:
      vuln_net:
        aliases:
          - webgoat

networks:
  vuln_net:
    external: true
    name: vuln_scanner_network
