services:

  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      VS_DEFECTDOJO_URL: http://nginx:8080
      # LLM analysis — override via .env or environment
      # VS_LLM_API_KEY: ""          # or OPENAI_API_KEY
      # VS_LLM_BASE_URL: ""         # or OPENAI_BASE_URL (for non-OpenAI endpoints)
      # VS_LLM_MODEL: "gpt-4o"      # required when LLM active
      # VS_LLM_FEATURE_EXECUTE_POC: "false"  # set "true" for in-container PoC execution
    volumes:
      - ./reports:/app/reports
    networks:
      - vuln_net
    # Scanner is a one-shot command: pass arguments via docker compose run.
    # Example:
    #   docker compose -f docker-compose.yml -f docker-compose.scanner.yml \
    #     run --rm scanner --targets 192.168.1.1 --mode active

networks:
  vuln_net:
    external: true
    name: vuln_scanner_network
