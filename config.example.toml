# vuln-scanner configuration example
# Copy to config.toml and customise.
# Priority order (highest wins): CLI args > environment variables > this file.
# Env prefix: VS_*  (e.g. VS_LLM_MODEL, VS_LLM_API_KEY)
# Also honours standard OPENAI_API_KEY / OPENAI_BASE_URL as fallbacks for LLM.

# ─── Scan targets ─────────────────────────────────────────────────────────────
[scan]
# Mix target types freely — tools only act on the types they support.
#   hostname / IP / CIDR  → network tools (nmap, masscan, smbmap …)
#   http/https URL        → web tools (nikto, nuclei, dalfox …)
#   /path/to/dir|file     → SAST / IaC / secret tools (bandit, semgrep, checkov …)
#   image:tag             → container tools (trivy, grype)
#   git URL / .git path   → secret / repo tools (trufflehog, gitleaks)
targets = [
    "http://example.com",
    "192.168.1.1",
    "/path/to/project",
]

# ─── Lab / practice targets (pentest-ground.com) ─────────────────────────────
# Publicly available intentionally-vulnerable systems — safe to scan for testing.
# Uncomment to use these as default targets for tool validation and PoC runs.
#
# targets = [
#     "https://pentest-ground.com:4280",   # DVWA      — CSRF, XSS, SQLi
#     "https://pentest-ground.com:5013",   # DVGQL     — GraphQL CMDi/XSS/SQLi
#     "https://pentest-ground.com:9000",   # RestFlaw  — REST API SQLi/XXE/Code Injection
#     "https://pentest-ground.com:81",     # GuardianLeaks — XSS/SSRF/Code Injection
# ]
timeout        = 300     # seconds per tool per target
max_concurrent = 3       # parallel tool executions
mode           = "passive" # paranoid | passive | active | aggressive
# rate_limit   = 50      # requests/s for tools that honour it

# ─── Authenticated scanning ───────────────────────────────────────────────────
# Credentials are forwarded to all applicable web tools (nuclei, ffuf, nikto, …).
# Global defaults apply to every target unless a per-target override is defined.
#
# env (global only): VS_AUTH_BEARER_TOKEN, VS_AUTH_USERNAME, VS_AUTH_PASSWORD,
#                    VS_AUTH_LOGIN_URL
# CLI (global only): --auth-bearer TOKEN  --auth-user USER  --auth-pass PASS
#                    --auth-cookie name=value  --auth-header Name=Value
#
# Per-target overrides are config-file only and take full precedence for that
# target — they are not merged with the global config.

[scan.auth]
# Global default credentials (applied when no per-target entry matches)
# bearer_token = ""
# username     = ""
# password     = ""
# login_url    = ""
# [scan.auth.cookies]
# session = "abc123"
# [scan.auth.headers]
# X-API-Key = "global-key"

# Per-target auth — keyed by the exact target string.
# Each entry is a full AuthConfig; it replaces the global config for that target.

# Example: JWT for the main web app
[scan.auth.targets."https://app.example.com"]
bearer_token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

# Example: cookie-based session for a legacy admin panel
[scan.auth.targets."https://admin.example.com"]
[scan.auth.targets."https://admin.example.com".cookies]
session    = "s%3Aabc123"
csrftoken  = "xyz789"

# Example: HTTP Basic for an internal API
[scan.auth.targets."10.0.0.50"]
username = "apiuser"
password = "s3cret"

# Example: form login (scanner POSTs credentials, then carries the session)
[scan.auth.targets."https://legacy.example.com"]
login_url  = "https://legacy.example.com/login"
username   = "admin"
password   = "password123"
[scan.auth.targets."https://legacy.example.com".login_data]
_token = "csrf-value-here"

# ─── Tool / category filtering ────────────────────────────────────────────────
[categories]
include = []   # non-empty = run ONLY these categories
exclude = []   # always skip these categories

[tools]
include = []   # non-empty = run ONLY these tools by name
exclude = []   # always skip these tools by name

# ─── Plugin system ────────────────────────────────────────────────────────────
# Drop a .py file defining one or more AbstractTool subclasses into ./plugins/
# (or ~/.vuln-scanner/plugins/) and they are registered automatically at startup.
#
# env: VS_PLUGINS_ENABLED, VS_PLUGINS_DIRS
# CLI: --no-plugins  --plugin-dir /path/to/dir
#
# Per-target behaviour is controlled by each plugin's applicable_targets field,
# not by config.  A plugin that declares:
#
#   applicable_targets = frozenset({TargetType.URL})
#
# will only run against URL targets and be skipped for IPs, paths, etc. —
# the orchestrator enforces this automatically, exactly like built-in tools.
# To restrict a plugin to specific targets beyond type-gating, add logic
# inside build_command() or run() that returns ScanStatus.SKIPPED.

[plugins]
enabled = true
# dirs = ["/opt/company-scanners", "~/my-plugins"]
#
# Discovery order (later entries override on name collision):
#   1. ./plugins/
#   2. ~/.vuln-scanner/plugins/
#   3. dirs listed above

# ─── Reporting ────────────────────────────────────────────────────────────────
[report]
formats       = ["markdown", "html", "json"]   # any subset; all three recommended
output_dir    = "./reports"
# min_severity = "none"   # Filter findings below this level from all reports.
                           # Choices: none (default, include all) | info | low | medium | high | critical
                           # env: VS_REPORT_MIN_SEVERITY

# ─── DefectDojo integration (optional) ───────────────────────────────────────
[defectdojo]
url             = "http://localhost:8080"
api_key         = ""
product_name    = ""
engagement_name = "Automated Scan"

# ─── LLM analysis (OpenAI-compatible) ────────────────────────────────────────
[llm]
# enabled = "auto"      # "auto" = on when api_key present; true/false to force
                        # env: VS_LLM_ENABLED
# api_key  = ""         # env: VS_LLM_API_KEY  or  OPENAI_API_KEY
# base_url = ""         # env: VS_LLM_BASE_URL or  OPENAI_BASE_URL
#                       # Override for non-OpenAI endpoints:
#                       #   Ollama:    "http://localhost:11434/v1"
#                       #   vLLM:      "http://localhost:8000/v1"
#                       #   OpenRouter:"https://openrouter.ai/api/v1"
# model    = "gpt-4o"   # REQUIRED when LLM active — no default, fails fast
                        # env: VS_LLM_MODEL

# ── Sampling (all OpenAI-compatible, forwarded directly to the API) ───────────
# temperature       = 0.2
# top_p             = 0.9
# max_tokens        = 4096
# frequency_penalty = 0.0
# presence_penalty  = 0.0
# seed              = 42
# stop              = ["\n###"]

# ── Non-standard / gateway-specific params (e.g. top_k via extra_body) ───────
# Many OpenAI-compatible servers (Ollama, vLLM) expose top_k only via extra_body.
# [llm.extra_body]
# top_k = 40

# ── Scope filters (same include/exclude semantics as [tools] / [categories]) ──
# include_tools      = []
# exclude_tools      = ["checkov", "bandit"]
# include_categories = []
# exclude_categories = []

# ── Severity gate — findings below this level are not sent to the LLM ────────
# Default: "medium" — INFO and LOW findings are skipped (noise reduction).
# Set "low" or "info" to include everything; "high" to analyse only high+critical.
# env: VS_LLM_MIN_SEVERITY   CLI: --llm-min-severity
# min_severity = "medium"

# ─── LLM feature matrix ─────────────────��─────────────────────────────────────
# Each flag can be overridden per-tool or per-category (see below).
[llm.features]
logs_analysis         = true   # feed tool raw_output/error into LLM analysis
enrich                = true   # CWE / confidence / exploitability triage per finding
classify              = true   # classify findings for the clustering pass
cluster               = true   # group findings into root-cause clusters
mitigation            = true   # generate mitigation + remediation per finding
generate_poc          = true   # generate PoC scripts as report assets (host-safe)
execute_poc           = false  # run PoCs — CONTAINER-ONLY; never on host (opt-in)
false_positive_filter = true   # let LLM suppress likely false positives

# ── Per-tool feature overrides (tool > category > global precedence) ──────────
# [llm.features.tool.bandit]
# generate_poc = false   # no PoC for SAST findings

# [llm.features.tool.sqlmap]
# generate_poc = true
# execute_poc  = true    # enable in-container PoC execution for sqli

# ── Per-category feature overrides ────────────────────────────────────────────
# [llm.features.category.iac]
# generate_poc = false
# cluster      = false

# [llm.features.category.web]
# generate_poc = true

# ─── LLM prompt overrides ─────────────────────────────────────────────────────
# Leave any field empty to use the built-in template. Override to customise.
# Available placeholders vary by template — see vuln_scanner/llm/prompts.py.
# [llm.prompts]
# enrich_system     = "You are a CISA analyst. Return only JSON."
# enrich_user       = "Triage: {title} on {target}..."
# cluster_system    = ""
# cluster_user      = ""
# mitigation_system = ""
# mitigation_user   = ""
# poc_system        = ""
# poc_user          = ""

# ─── PoC generation / execution mechanics ────────────────────────────────────
[llm.poc]
languages       = ["python", "bash"]   # script languages to generate
timeout         = 120                  # seconds per PoC execution (container-only)
allow_git_clone = false                # clone official exploit PoCs from git
max_pocs        = 20                   # cap to avoid runaway generation
only_severities = ["critical", "high", "medium"]
# assets_dir    = ""                   # default: <report_dir>/<timestamp>_assets/poc/
